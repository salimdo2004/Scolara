<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2c7be5;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1a68d1;
        }

        .error {
            color: red;
            text-align: center;
        }
    </style>

</head>
<body>

<div class="card">

    <h1>Register</h1>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

<form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>

    <input type="text" name="child_id" placeholder="ID de l'enfant" required>

    <input type="text" name="phone" placeholder="Phone" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="text" name="occupation" placeholder="Occupation" required>

    <select name="role" required>
        <option value="parent">Parent</option>
    </select>

    <button type="submit">Create Account</button>
</form>

</div>

</body>
</html>
